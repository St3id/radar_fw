const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,1,50000);
cam.position.set(3000,2500,3000);cam.lookAt(0,0,0);
const rnd=new THREE.WebGLRenderer({antialias:true});
rnd.setSize(innerWidth,innerHeight);rnd.setClearColor(0x06100c);
document.body.appendChild(rnd.domElement);
const geo=new THREE.BufferGeometry();
const pos=[];PTS.forEach(p=>pos.push(p[0],p[2],p[1]));
geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
const mat=new THREE.PointsMaterial({color:0x34e29b,size:40});
scene.add(new THREE.Points(geo,mat));
const r=new THREE.Mesh(new THREE.SphereGeometry(80,16,16),
new THREE.MeshBasicMaterial({color:0xff5d3b}));scene.add(r);
scene.add(new THREE.GridHelper(6000,12,0x1c3a2e,0x1c3a2e));
let rotY=0.6,rotX=0.4,down=false,px=0,py=0,dist=5000;
addEventListener('mousedown',e=>{down=true;px=e.clientX;py=e.clientY;});
addEventListener('mouseup',()=>down=false);
addEventListener('mousemove',e=>{if(!down)return;
rotY+=(e.clientX-px)*0.005;rotX+=(e.clientY-py)*0.005;px=e.clientX;py=e.clientY;});
addEventListener('wheel',e=>{dist*=(1+e.deltaY*0.001);});
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;
cam.updateProjectionMatrix();rnd.setSize(innerWidth,innerHeight);});
function loop(){requestAnimationFrame(loop);
cam.position.x=Math.cos(rotY)*Math.cos(rotX)*dist;
cam.position.z=Math.sin(rotY)*Math.cos(rotX)*dist;
cam.position.y=Math.sin(rotX)*dist;cam.lookAt(0,0,0);
rnd.render(scene,cam);}loop();
