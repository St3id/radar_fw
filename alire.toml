name: Build, Test & Prove

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Alire
        uses: alire-project/setup-alire@v4

      # Compile le projet principal (resout gnatprove).
      - name: Build
        run: alr build

      # Construit les tests via Alire en ciblant le projet de test :
      # Alire materialise alors l'environnement complet, AUnit inclus.
      - name: Build tests
        run: alr exec -- gprbuild -p -P radar_fw_tests.gpr -largs -lstdc++

      - name: Run tests
        run: ./bin/run_tests

      - name: SPARK proof
        run: alr gnatprove