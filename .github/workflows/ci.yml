name: Build, Test & Prove

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Alire
        uses: alire-project/setup-alire@v4

      # Resout et telecharge TOUTES les dependances declarees (AUnit inclus).
      - name: Resolve dependencies
        run: alr update

      - name: Build
        run: alr build

      - name: Diagnostic AUnit
        run: |
          echo "=== alr with (dependances) ==="
          alr with
          echo "=== recherche de aunit.gpr ==="
          find ~ -name "aunit.gpr" 2>/dev/null || echo "aunit.gpr INTROUVABLE"
          echo "=== GPR_PROJECT_PATH ==="
          alr printenv | grep -i gpr || echo "pas de variable GPR"

      - name: Run tests
        run: ./bin/run_tests

      - name: SPARK proof
        run: alr gnatprove