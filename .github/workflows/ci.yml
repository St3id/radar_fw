name: Build, Test & Prove

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Alire
        uses: alire-project/setup-alire@v4

      # Compile le projet principal.
      - name: Build
        run: alr build

      # Compile les tests VIA Alire (telecharge AUnit automatiquement).
      - name: Build tests
        run: alr action test

      # Lance l'executable de tests produit.
      - name: Run tests
        run: alr exec -- ./bin/run_tests

      # Rejoue la preuve formelle SPARK.
      - name: SPARK proof
        run: alr gnatprove